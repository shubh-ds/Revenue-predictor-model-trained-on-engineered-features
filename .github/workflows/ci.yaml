name: CI/CD pipeline

on:
  push:
    branches:
      - master

jobs:
  continuous_integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pipenv'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install

      - name: Pull DVC data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: pipenv run dvc pull

      - name: Run DVC pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run dvc repro

      - name: Run model tests
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run python -m unittest tests.test_model

      - name: Promote model to production
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run python scripts/promote_model.py

      -  name: Run Flask application tests
         if: success()
         env:
            DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
         run: pipenv run python -m unittest tests.test_flask_app

      - name: Login to AWS ECR
        if: success()
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 339713007263.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        if: success()
        run: |
          docker build -t revenue_predictor_ecr .

      - name: Tag Docker image
        if: success()
        run: |
          docker tag revenue_predictor_ecr:latest 339713007263.dkr.ecr.us-east-1.amazonaws.com/revenue_predictor_ecr:latest

      - name: Push Docker image to AWS ECR
        if: success()
        run: |
          docker push 339713007263.dkr.ecr.us-east-1.amazonaws.com/revenue_predictor_ecr:latest

  continuous_deployment:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: continuous_integration

    steps:
      - name: Deploy to single EC2 instance
        if: success()
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set default.region us-east-1
            docker stop revenue_predictor || true
            docker rm  revenue_predictor || true
            docker system prune -a -f
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 339713007263.dkr.ecr.us-east-1.amazonaws.com
            docker pull 339713007263.dkr.ecr.us-east-1.amazonaws.com/revenue_predictor_ecr:latest
            docker run -d -p 80:5000 -e DAGSHUB_PAT=${{ secrets.DAGSHUB_PAT }} --name revenue_predictor 339713007263.dkr.ecr.us-east-1.amazonaws.com/revenue_predictor_ecr:latest

