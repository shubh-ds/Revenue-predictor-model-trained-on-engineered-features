name: CI/CD pipeline

on:
  push:
    branches:
      - master

jobs:
  continuous_integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pipenv'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install

      - name: Pull DVC data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: pipenv run dvc pull

      - name: Run DVC pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run dvc repro

      - name: Run model tests
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run python -m unittest tests/test_model.py

      - name: Promote model to production
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: pipenv run python scripts/promote_model.py

      -  name: Run Flask application tests
         if: success()
         env:
            DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
         run: pipenv run python -m unittest tests/test_flask_app.py

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}

      - name: Build Docker Image
        if: success()
        run: |
          docker build -t ${{secrets.DOCKER_HUB_USERNAME}}/revenuepredictor:latest .

      - name: Push Docker Image to Docker Hub
        if: success()
        run: |
          docker push ${{secrets.DOCKER_HUB_USERNAME}}/revenuepredictor:latest
